                    <LABEL>SKILLS:</LABEL>
                    <INPUT TYPE="CHECKBOX">PYTHON
                        <INPUT TYPE ="checkbox">JAVA
                            <INPUT TYPE="CHECKBOX">C++<BR><BR>
       <LABEL>EMAIL:</LABEL>    
       <INPUT TYPE="E-MAIL" placeholder=><BR><BR>
        <LABEL>PASSWORD:</LABEL>
        <INPUT TYPE="PASSWORD" placeholder=><BR><BR>
            <LABEL>ADDRESS</LABEL>     
            <INPUT TYPE="TEXT" placeholder="ENTER YOUR ADDRESS"><BR><BR>
                <LABEL>COLLEGE NAME:</LABEL>
                <INPUT TYPE="TEXT" placeholder=><BR><BR>
                    <button>SUBMIT </button>
                    <button>RESET</button>
                    </H3>           
    </form>
    </fieldset>
    </CENTER>
</body>
</html>
